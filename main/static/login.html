<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Pump Control - Login</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-bg">
<div class="login-container">
    <main class="login-card">
        <header class="login-header">
            <div class="icon-circle">&#9881;</div>
            <div>
                <h1>Fish Pump Control</h1>
                <p>จัดการอุปกรณ์และการเชื่อมต่อของคุณ</p>
            </div>
        </header>
        <form id="login-form" onsubmit="return false;">
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้งาน</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#128100;</span>
                    <input id="username" name="username" type="text" placeholder="admin" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#128274;</span>
                    <input id="password" name="password" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required autocomplete="current-password">
                </div>
            </div>
            <div id="login-error" role="alert" style="color:var(--error);font-size:14px;margin-bottom:8px;display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block" id="login-btn">เข้าสู่ระบบ</button>
        </form>
        <div class="login-footer">
            <p>Fish Pump Wi-Fi Setup</p>
        </div>
    </main>
</div>
<script src="/app.js"></script>
</body>
</html>
