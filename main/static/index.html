<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Pump Control</title>
<link rel="stylesheet" href="/style.css">
<style>
  #app-content {
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (min-width: 1024px) {
    #app-content {
      margin-left: max(280px, calc((100% - 1200px) / 2 + 280px));
    }
  }
  .view.hidden {
    display: none !important;
  }
</style>
</head>
<body>
<!-- Mobile Top Bar -->
<header class="mobile-topbar">
    <span class="brand">Fish Pump Control</span>
    <button class="hamburger-btn" aria-label="Open Navigation" aria-expanded="false" onclick="var s=document.getElementById('app-sidebar'),o=document.getElementById('drawer-overlay'),x=s&&!s.classList.contains('open');if(s&&o){s.classList.toggle('open',x);o.classList.toggle('open',x);this.setAttribute('aria-expanded',x?'true':'false');}">&#9776;</button>
</header>

<!-- Mobile Drawer Overlay -->
<div class="drawer-overlay" id="drawer-overlay" onclick="var s=document.getElementById('app-sidebar'),b=document.querySelector('.hamburger-btn');if(s){s.classList.remove('open');this.classList.remove('open');}if(b)b.setAttribute('aria-expanded','false');"></div>

<!-- Sidebar (Desktop & Mobile) -->
<aside class="app-sidebar" id="app-sidebar">
    <div class="sidebar-brand">
        <div class="brand-name">Fish Pump Control</div>
        <div class="sidebar-node-info">
            <div class="node-icon">&#9881;</div>
            <div>
                <div class="node-name">Fish Pump Control</div>
                <div class="node-status">
                    <span class="status-dot" id="sidebar-status-dot"></span>
                    <span id="sidebar-status-text">Online</span>
                </div>
            </div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item active" id="nav-dashboard">
            <span class="nav-icon">&#9632;</span> Dashboard
        </a>
        <a href="/status" class="nav-item" id="nav-status">
            <span class="nav-icon">&#9881;</span> System Status
        </a>
        <a href="/wifi" class="nav-item" id="nav-wifi">
            <span class="nav-icon">&#128246;</span> Wi-Fi Settings
        </a>
        <a href="/hardware" class="nav-item" id="nav-hardware">
            <span class="nav-icon">&#128295;</span> Hardware/Install
        </a>
        <a href="#" class="nav-item" id="nav-logout" onclick="doLogout();return false;">
            <span class="nav-icon">&#128682;</span> Logout
        </a>
    </nav>
</aside>

<!-- Main Content -->
<main id="app-content" class="main-content">
    <section id="view-login" class="view hidden"></section>
    <section id="view-dashboard" class="view hidden"></section>
    <section id="view-status" class="view hidden"></section>
    <section id="view-wifi" class="view hidden"></section>
    <section id="view-hardware" class="view hidden"></section>
</main>

<script src="/app.js"></script>
</body>
</html>
